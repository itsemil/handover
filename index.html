<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Handover & Issue Tracker</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --box-bg: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px; 
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--box-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .hidden { display: none !important; }
        
        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px;
        }

        select, input[type="text"], input[type="password"], textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't widen the box */
            font-size: 16px; /* Prevents iOS auto-zoom on inputs */
        }

        input[type="file"] {
            margin-top: 5px;
            font-size: 14px;
        }

        button { 
            width: 100%;
            padding: 14px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer; 
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #004494;
        }

        button:disabled {
            background-color: #999999;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginSection">
            <h2>Operator Login</h2>
            <div class="form-group">
                <label for="usernameInput">Username</label>
                <input type="text" id="usernameInput" placeholder="e.g., jsmith">
            </div>
            <div class="form-group">
                <label for="pinInput">PIN</label>
                <input type="password" id="pinInput" placeholder="Enter your PIN">
            </div>
            <button id="loginBtn">Login</button>
        </div>

        <div id="dashboardSection" class="hidden">
            <h2>Log a Plant Issue</h2>
            
            <div class="form-group">
                <label for="shiftSelect">Shift</label>
                <select id="shiftSelect">
                    <option value="Days">Days</option>
                    <option value="Afternoon">Afternoon</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="areaSelect">Area / Machine</label>
                <select id="areaSelect">
                    <option value="" disabled selected>Select Area...</option>
                    <option value="Gopfert 1">Gopfert 1</option>
                    <option value="Gopfert 2">Gopfert 2</option>
                    <option value="Gopfert 3">Gopfert 3</option>
                    <option value="Bobst Masterfold">Bobst Masterfold</option>
                    <option value="Emba 175">Emba 175</option>
                    <option value="Emba 245">Emba 245</option>
                    <option value="WIP">WIP</option>
                    <option value="Baler">Baler</option>
                    <option value="Inkstore">Inkstore</option>
                    <option value="BCM">BCM</option>
                    <option value="Mainline">Mainline</option>
                    <option value="Strapping line">Strapping line</option>
                    <option value="Corrugator">Corrugator</option>
                </select>
            </div>

            <div class="form-group">
                <label for="issueInput">Issue Description</label>
                <textarea id="issueInput" rows="4" placeholder="e.g., Incorrect board on feed, forklift battery flat..."></textarea>
            </div>

            <div class="form-group">
                <label for="photoInput">Evidence (Photo)</label>
                <input type="file" id="photoInput" accept="image/*" capture="environment">
            </div>

            <button id="submitBtn">Submit Report</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
